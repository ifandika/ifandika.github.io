<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clone App Google Clock | Project Ifandika</title>
  <link rel="stylesheet" href="assets/styles/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous"> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>

  <div class="my-container">

    <div class="container-phone-size">

      <div class="base-top">
        <div class="top-title">
          <p>Alarm</p>
          <div class="dropdown">
            <i id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" class="bi bi-three-dots-vertical"></i>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
              <a class="dropdown-item" href="#">Screensaver</a>
              <a class="dropdown-item" href="#">Settings</a>
              <a class="dropdown-item" href="#">Privacy policy</a>
              <a class="dropdown-item" href="#">Help</a>
              <a class="dropdown-item" href="#">Send feedback</a>
            </div>
          </div>
        </div>

        <div class="top-body">

          <div class="alarm-base">
            <div class="left">
              <p id="alarm-clock">09:00</p>
              <p id="alarm-info">Not Schedule</p>
            </div>
            <div class="right">
              <i class="bi bi-caret-down-square"></i>
              <div class="form-check form-switch alarm-on-off">
                <input class="h3 form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
              </div>
            </div>
          </div>

        </div>

        <div class="top-bottom">
          <div class="circle-add">
            <i class="bi bi-plus-lg"></i>
          </div>
        </div>
      </div>

      <div class="base-bottom">
        <div class="menu">
          <div class="bg-ic-menu">
            <i class="bi bi-alarm ic-menu-custom"></i>
          </div>
          <p class="title-menu-custom">Alarm</p>
        </div>
        <div class="menu">
          <div class="bg-ic-menu">
            <i class="bi bi-clock ic-menu-custom"></i>
          </div>
          <p class="title-menu-custom">Clock</p>
        </div>
        <div class="menu">
          <div class="bg-ic-menu">
            <i class="bi bi-hourglass-top ic-menu-custom"></i>
          </div>
          <p class="title-menu-custom">Timer</p>
        </div>
        <div class="menu">
          <div class="bg-ic-menu">
            <i class="bi bi-stopwatch ic-menu-custom"></i>
          </div>
          <p class="title-menu-custom">Stopwatch</p>
        </div>
        <div class="menu">
          <div class="bg-ic-menu">
            <i class="bi bi-moon-stars ic-menu-custom"></i>
          </div>
          <p class="title-menu-custom">Beedtime</p>
        </div>
      </div>

    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
