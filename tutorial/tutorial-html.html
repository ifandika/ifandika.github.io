<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="index.php" method="POST" enctype="multipart/form-data">
        <label for="username">Username:</label>
        <input type="text" placeholder="Ifandika ..." required="true"><br>

        <label for="password">Password:</label>
        <input type="password" placeholder="123*%& ..."><br>

        <label for="email">Email:</label>
        <input type="email" placeholder="ifan@fake.com ..."><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="081-555-666" pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}"><br>

        <label for="bday">Birthdate:</label>
        <input type="date"><br>

        <label for="quantity">Quantity:</label>
        <input type="number" min="1" max="99" value="1"><br>

        <label for="payment">Payment:</label>
        <select name="payment" id="payment">
            <option value="Visa">Visa</option>
            <option value="PayPal">PayPal</option>
            <option value="Gopay">Gopay</option>
        </select><br>

        <label for="subcribe">Subcribe:</label>
        <input type="checkbox"><br>

        <label for="comment">Comment:</label>
        <textarea id="comment" placeholder="Just to be ..." rows="3" cols="35"></textarea><br>

        <label for="file">File:</label>
        <input id="file" type="file" accept="image/png, image/jpeg"><br>
        <input type="reset"><br>
        <input type="submit">
    </form>
</body>
</html>
