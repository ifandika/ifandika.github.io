<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Ifandika - Home</title>
		<style type="text/css" media="all">
			body {
				margin: 0;
				padding: 0;
				font-family: Sans-Serif, Segoe UI;
			}
			
			.sidenav {
				height: 100%; /* 100% Full-height */
				width: 0; /* 0 width - change this with JavaScript */
				position: fixed; /* Stay in place */
				z-index: 1; /* Stay on top */
				top: 0; /* Stay at the top */
				left: 0;
				background-color: #111; /* Black*/
				overflow-x: hidden; /* Disable horizontal scroll */
				padding-top: 0px; /* Place content 60px from the top */
				transition: 0.5s; /* 0.5 second transition effect to slide in the sidenav */
			}
			
			.path {
				margin: 0;
				padding: 15px;
				background-color: #1e1e1ef2;
			}
			
			.path p {
				font-size: 15px;
				color: white;
				margin: 0;
				padding: 0;
			}
			
			.top {
				padding: 15px;
				background-color: #3b77b2f2;
			}
			
			h2 {
				color: white;
			}
			
			.top #menu_text {
				color: white;
				font-weight: bold;
				font-size: 30px;
			}
			
			.top #menu_icon {
				height: 30px;
				width: 30px;
			}
			
			.sidenav a {
				padding: 8px 8px 8px 32px;
				text-decoration: none;
				font-size: 25px;
				color: #818181;
				display: block;
				transition: 0.3s;
			}
			
			.menu_list a:hover {
				color: #f1f1f1;
				background-color: #3b77b2f2;
				padding-left: 50px;
			}
			
			/* Position and style the close button (top right corner) */
			.sidenav .closebtn {
				position: absolute;
				top: 0;
				right: 25px;
				font-size: 50px;
			}
			
			#main {
				transition: 5s
				margin-left 5s;
				padding: 20px;
			}
			
			/* On smaller screens, where height is less than 450px, change the style of the sidenav (less padding and a smaller font size) */
			@media screen and (max-height: 450px) {
				.sidenav {padding-top: 15px;}
				.sidenav a {font-size: 18px;}
			}
			
		</style>
	</head>
	<body>
		<div id="mySidenav" class="sidenav">
			<h2>Menu</h2>
			<a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
			<div class="menu_list">
				<a href="../index.html">Beranda</a>
				<a href="projek/index.html">Projek</a>
				<a href="tutorial/index.html">Tutorial</a>
				<a href="#">Tentang</a>
			</div>
		</div>
		
		<div class="top">
			<div id="menu_text" onclick="openNav()">
				<img id="menu_icon" src="resources/menu.png" alt=""/>
				Ifandika
			</div>
		</div>
		
		<div class="path">
			<p>Beranda</p>
		</div>
		
		<script type="text/javascript" charset="utf-8">
			function openNav() {
				document.getElementById("mySidenav").style.width = "50%";
			}
			
			function closeNav() {
				document.getElementById("mySidenav").style.width = "0%";
			}
		</script>
	</body>
</html>
